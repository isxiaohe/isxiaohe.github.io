baseURL: https://example.org/
languageCode: zh-cn
title: Zhifei
theme: PaperMod

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
          - - $
            - $
        enable: true

params:

  homeInfoParams:
    Title: 👋 Hello, I'm Zhifei Yang
    Content: Undergrad at PKU, Beijing, China. Interested in CV and Emobodied AI. Math and TCS enthusiast(but amateur).
  
  math: true

  socialIcons:
    - name: Github
      url: "https://github.com/isxiaohe"
    - name: Email
      url: "mailto:zhifei.yeung@gmail.com"

  fuseOpts:
    - isCaseSensitive: false
    - shouldSort: true
    - location: 0
    - distance: 1000
    - threshold: 0.4
    - minMatchCharLength: 0
    - keys: ["title", "permalink", "summary", "content"]

  features:
    - search



menu:
  main:
    - identifier: tag
      name: Tags
      url: /tags/
      weight: 3
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 1
    - identifier: publications
      name: Publications
      url: /publications/
      weight: 2

output:
  home:
    - HTML
    - RSS
    - JSON